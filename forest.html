<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Randonnée – Forêt procédurale</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh}
canvas{width:100%;height:100%;display:block;will-change:transform;transform:translateZ(0)}
#hud{position:fixed;top:0;left:0;right:0;background:rgba(8,10,14,.74);padding:5px 16px;display:flex;gap:24px;justify-content:center;z-index:10;opacity:0;transition:opacity .6s}
#hud span{color:#fff;font:13px/1.8 monospace}
#hud button{background:none;border:none;cursor:pointer;font-size:16px;padding:0 2px;opacity:.7;transition:opacity .2s}
#hud button:hover{opacity:1}
#bar{position:fixed;bottom:10px;left:10px;right:10px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.66);border-radius:7px;padding:7px 14px;z-index:10}
#bar span{color:#9ab;font-size:11px;white-space:nowrap}
#bar #sl{color:#fff;min-width:60px}
input[type=range]{flex:1;accent-color:#7ecf7e;height:3px}
button{background:rgba(255,255,255,.12);border:none;border-radius:4px;color:#fff;font-size:13px;padding:3px 10px;cursor:pointer}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#cdd;font:14px monospace;background:#000;z-index:20;gap:16px}
#loading p{opacity:.6;font-size:12px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="loading">
  <div>Compilation du shader… ≈5 secondes</div>
  <p>Forêt procédurale · Ray Marching GLSL · adapté pour randonnée</p>
</div>
<div id="hud">
  <span id="h1">0.0 km/h</span>
  <span id="h2">0.00 km</span>
  <span id="h3">0:00:00</span>
  <span id="h4">0 pas</span>
  <button id="btn-seed-default" title="Paysage par défaut">🏡</button>
  <button id="btn-seed-random"  title="Paysage aléatoire">🎲</button>
  <button id="btn-pip" title="Picture-in-Picture (fenêtre flottante)">⧉</button>
</div>
<div id="bar">
  <button id="btn">⏸</button>
  <span>Vitesse</span>
  <input type="range" id="sp" min="0" max="20" step="0.1" value="4">
  <span id="sl">4.0 km/h</span>
</div>
<script>
// ══════════════════════════════════════════════════════════════════════════════
//  Vertex shader
// ══════════════════════════════════════════════════════════════════════════════
const VS = `#version 300 es
layout(location=0) in vec2 aPos;
void main(){ gl_Position = vec4(aPos, 0., 1.); }`;

// ══════════════════════════════════════════════════════════════════════════════
//  Blit shader
// ══════════════════════════════════════════════════════════════════════════════
const BLIT_VS = `#version 300 es
layout(location=0) in vec2 aPos;
out vec2 vUV;
void main(){ vUV = aPos*.5+.5; gl_Position=vec4(aPos,0.,1.); }`;
const BLIT_FS = `#version 300 es
precision mediump float;
uniform sampler2D uTex;
in vec2 vUV;
out vec4 fragColor;
void main(){ fragColor=texture(uTex,vUV); }`;

// ══════════════════════════════════════════════════════════════════════════════
//  Fragment shader – Forêt procédurale
// ══════════════════════════════════════════════════════════════════════════════
const FS = `#version 300 es
precision highp float;
uniform vec3  iResolution;
uniform float iTime;
uniform int   iFrame;
uniform float uDist;
uniform float uSpeed;
uniform float uSeed;
out vec4 fragColor;

// ---- Noise functions ----
float hash(float p){return fract(sin(p)*43758.5453);}
float hash1(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
vec2 hash2(vec2 p){
  return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);
}
float hash1v3(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453);}

float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.0-2.0*f);
  float a=hash1(i),b=hash1(i+vec2(1,0)),
        c=hash1(i+vec2(0,1)),d=hash1(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}

// Bruit 3D isotrope (pas de striping axial)
float noise3(vec3 p){
  vec3 i=floor(p), f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(
    mix(mix(hash1v3(i+vec3(0,0,0)),hash1v3(i+vec3(1,0,0)),f.x),
        mix(hash1v3(i+vec3(0,1,0)),hash1v3(i+vec3(1,1,0)),f.x),f.y),
    mix(mix(hash1v3(i+vec3(0,0,1)),hash1v3(i+vec3(1,0,1)),f.x),
        mix(hash1v3(i+vec3(0,1,1)),hash1v3(i+vec3(1,1,1)),f.x),f.y),
    f.z);
}

// ---- Perlin noise 2D (gradient noise) ----
vec2 pgrad(vec2 i){
  float h = hash1(i) * 6.28318;
  return vec2(cos(h), sin(h));
}
float perlin(vec2 p){
  vec2 i = floor(p), f = fract(p);
  // Quintic smoothstep (meilleure continuité C2)
  vec2 u = f*f*f*(f*(f*6.0-15.0)+10.0);
  return mix(
    mix(dot(pgrad(i+vec2(0,0)), f-vec2(0,0)),
        dot(pgrad(i+vec2(1,0)), f-vec2(1,0)), u.x),
    mix(dot(pgrad(i+vec2(0,1)), f-vec2(0,1)),
        dot(pgrad(i+vec2(1,1)), f-vec2(1,1)), u.x), u.y
  ) * 0.5 + 0.5;
}
float fbmPerlin(vec2 p, int oct){
  float v=0.0, a=0.5;
  mat2 m=mat2(1.6,1.2,-1.2,1.6);
  for(int i=0;i<6;i++){
    if(i>=oct) break;
    v+=a*perlin(p); p=m*p; a*=0.5;
  }
  return v;
}

float fbm(vec2 p, int oct){
  float v=0.0, a=0.5;
  mat2 m=mat2(1.6,1.2,-1.2,1.6);
  for(int i=0;i<8;i++){
    if(i>=oct) break;
    v+=a*noise(p);p=m*p;a*=0.5;
  }
  return v;
}

// ---- Trail (sentier sinueux) ----
float trailX(float z){
  float s = uSeed * 0.1;
  return  5.0 * sin(z*0.048 + s)
        + 2.5 * sin(z*0.115 + s*2.3 + 1.7)
        + 1.2 * sin(z*0.270 + s*0.75 + 0.9);
}

// ---- Stream ----
float streamX(float z){
  return trailX(z) - 4.0 + sin(z*0.07 + uSeed)*2.5 + sin(z*0.03 + uSeed*0.5)*1.5;
}

// ---- SDF primitives ----
float sdCylinder(vec3 p, float r, float h){
  vec2 d=abs(vec2(length(p.xz),p.y))-vec2(r,h);
  return min(max(d.x,d.y),0.0)+length(max(d,0.0));
}
float sdSphere(vec3 p, float r){ return length(p)-r; }

// ---- Ground ----
float groundH(vec2 xz){
  // 1. Forme macro du paysage : grandes vallées et crêtes (λ≈330m)
  float macro   = fbm(xz * 0.003 + vec2(1.5, 8.2), 2) * 12.0;

  // 2. Masque de zone (λ≈200m) : 0 = section douce, 1 = section raide
  float zone    = smoothstep(0.3, 0.7, fbm(xz * 0.005 + vec2(4.2, 1.9), 2));

  // 3. Profil doux ~5% : crêtes perpendiculaires au chemin, λ≈45m et λ≈125m
  float gentle  = fbm(vec2(xz.y * 0.022, xz.x * 0.007) + vec2(2.9, 6.1), 3) * 3.5
                + fbm(vec2(xz.y * 0.008, xz.x * 0.003) + vec2(5.2, 1.8), 2) * 5.0;

  // 4. Profil raide ~10% : côtes plus marquées, λ≈55m et λ≈167m
  float steep   = fbm(vec2(xz.y * 0.018, xz.x * 0.006) + vec2(4.1, 9.3), 2) * 7.0
                + fbm(vec2(xz.y * 0.006, xz.x * 0.002) + vec2(7.8, 3.5), 2) * 9.0;

  // 5. Mélange harmonisé : gentle et steep s'excluent mutuellement via zone
  float hills   = mix(gentle, steep, zone);

  // 6. Micro-détail du sol
  float detail  = fbm(xz * 0.15, 4) * 0.5;

  return macro + hills + detail - 12.0;
}

float ground(vec3 p){
  float h = groundH(p.xz);
  // Dépression ruisseau
  float sx = streamX(p.z);
  float ds = abs(p.x - sx);
  h -= smoothstep(1.2, 0.35, ds) * 0.55;
  // Dépression sentier
  float tx = trailX(p.z);
  float dt = abs(p.x - tx);
  h -= smoothstep(1.5, 0.2, dt) * 0.20;
  return p.y - h;
}

// ---- Water ----
float water(vec3 p){
  float sx = streamX(p.z);
  float ds = abs(p.x - sx);
  if(ds > 1.8) return 10.0;
  float wh = groundH(p.xz) - 0.42;
  float surf = p.y - wh - sin(p.x*3.0+iTime*2.0)*0.018 - sin(p.z*2.0+iTime*1.5)*0.018;
  return max(surf, ds - 0.75);
}

// ---- Tree ----
float treeTrunk(vec3 p, vec2 tpos, float seed){
  vec3 tp = p - vec3(tpos.x, groundH(tpos), tpos.y);
  float h = 3.5 + seed * 3.5;
  float r = 0.13 + seed * 0.14;
  tp.x += tp.y * sin(seed*20.0) * 0.04;
  tp.z += tp.y * cos(seed*30.0) * 0.04;
  float bark = sin(tp.y*15.0+seed*50.0)*0.01;
  return sdCylinder(tp - vec3(0,h,0), r+bark, h);
}

float treeCanopy(vec3 p, vec2 tpos, float seed){
  float h = 3.5 + seed * 3.5;
  float baseY = groundH(tpos) + h * 2.0;
  vec3 tp = p - vec3(tpos.x, 0.0, tpos.y);
  tp.x -= tp.y * sin(seed*20.0) * 0.04;
  tp.z -= tp.y * cos(seed*30.0) * 0.04;
  float r = 1.2 + seed * 1.4;
  float d = 1e5;
  for(int i=0; i<2; i++){
    float fi = float(i);
    float ly = baseY + fi * r * 0.55;
    float lr = r * (1.25 - fi*0.22);
    vec2 off = vec2(sin(seed*30.0+fi*7.0), cos(seed*40.0+fi*11.0)) * r * 0.22;
    vec3 cp = tp - vec3(off.x, ly, off.y);
    vec3 q = cp / vec3(lr, lr*0.44, lr);
    float e = (length(q) - 1.0) * lr * 0.44;
    e += noise(cp.xz * 4.0 + seed*10.0 + fi*5.0) * 0.25 - 0.12;
    float gap = noise(cp.xz * 1.5 + seed*20.0);
    if(gap > 0.78) e += 0.28;
    d = min(d, e);
  }
  float topH = baseY + r * 1.9;
  vec3 topP = tp - vec3(0, topH, 0);
  float cone = sdSphere(topP, r*0.32) + noise(topP.xz*6.0+seed*7.0)*0.12;
  return min(d, cone);
}

// ---- Fern ----
float fern(vec3 p, vec2 fpos, float seed){
  vec3 fp = p - vec3(fpos.x, groundH(fpos), fpos.y);
  float sz = 0.28 + seed * 0.28;
  float rad = length(fp.xz);
  float ang = atan(fp.z, fp.x);
  float arms = 5.0 + floor(seed * 3.0);
  float star = 0.6 + 0.4 * cos(ang * arms + seed * 10.0);
  float radius = sz * star;
  float t = clamp(rad / sz, 0.0, 1.5);
  float prof = sz * 0.35 * t * (1.0 - t * 0.7);
  float thick = 0.04 * sz * (1.0 - t * 0.5);
  float dr = max(rad - radius, 0.0);
  return length(vec2(dr, max(abs(fp.y - max(prof,0.0)) - thick, 0.0)));
}

// ---- Smooth-min polynomial ----
float smin(float a, float b, float k){
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

// ---- Bush (mat 5) — grille de petites sphères avec min() comme english_lane ----
// Petits/moyens buissons : grille de sphères 4.5cm comme english_lane
#define BUSH_R  0.045
#define BUSH_CS 0.095
float bush(vec3 p, vec2 bpos, float seed, float sz){
  // 1. Pre-check XZ SANS appeler groundH (évite ~7 fbm si ray est loin)
  float xzD = length(p.xz - bpos) - (sz + 0.30);
  if(xzD > 1.0) return xzD;
  float bh = groundH(bpos);
  // 2. Bounding sphere 3D
  vec3 bc = vec3(bpos.x, bh + sz*0.40, bpos.y);
  float bd = length(p - bc) - (sz + 0.25);
  if(bd > 0.15) return bd;
  // 3. Grille réduite 5×3×5 = 75 iter (était 196)
  float d = 1e10;
  for(int ix=-2; ix<=2; ix++){
    for(int iy=0; iy<=2; iy++){
      for(int iz=-2; iz<=2; iz++){
        float ri = length(vec2(float(ix), float(iz))) * BUSH_CS;
        if(ri > sz + BUSH_CS) continue;
        if(float(iy) * BUSH_CS * 0.6 > sz * 0.85 + BUSH_CS) continue;
        float hi = float(ix*7 + iy*13 + iz*3);
        vec3 sc = vec3(
          bpos.x + float(ix)*BUSH_CS + (hash1v3(vec3(hi,seed*97.,1.))-0.5)*BUSH_CS*0.5,
          bh + BUSH_R*mix(-0.4,1.6,hash1v3(vec3(hi,seed*97.,2.))) + float(iy)*BUSH_CS*0.60,
          bpos.y + float(iz)*BUSH_CS + (hash1v3(vec3(hi,seed*97.,3.))-0.5)*BUSH_CS*0.5
        );
        d = min(d, length(p - sc) - BUSH_R);
      }
    }
  }
  return d;
}

// Grands buissons : ellipsoïde + noise3 isotrope — O(1), taille illimitée
float bushLarge(vec3 p, vec2 bpos, float seed, float sz){
  // Pre-check XZ cheap
  float xzD = length(p.xz - bpos) - sz * 1.5;
  if(xzD > 1.0) return xzD;
  float bh = groundH(bpos);
  vec3 center = vec3(bpos.x, bh + sz*0.52, bpos.y);
  float bd = length(p - center) - sz * 1.55;
  if(bd > 0.3) return bd;
  float d = length((p - center) * vec3(1.0, 1.3, 1.0)) - sz;
  if(d < sz * 0.5){
    vec3 sp = p + vec3(seed*3.7, seed*2.1, seed*5.3);
    float freq = 1.8 / sz;
    float b1 = noise3(sp * freq * 3.0) - 0.5;
    float b2 = noise3(sp * freq * 7.0) - 0.5;
    d -= b1 * sz * 0.20 + b2 * sz * 0.07;
  }
  return d;
}

// ---- Scene SDF  (mat: 0=sol, 1=tronc, 2=canopée, 3=eau, 4=fougère, 5=buisson) ----
vec2 scene(vec3 p){
  float d = ground(p);
  float mat = 0.0;

  float w = water(p);
  if(w < d){ d = w; mat = 3.0; }

  vec2 cell = floor(p.xz / 3.8);
  for(int dx=-1; dx<=1; dx++){
    for(int dz=-1; dz<=1; dz++){
      vec2 cc = cell + vec2(float(dx), float(dz));
      vec2 jit = hash2(cc) * 3.0;
      vec2 tpos = cc * 3.8 + jit;
      float seed = hash1(cc);
      if(seed < 0.15) continue;
      if(abs(tpos.x - streamX(tpos.y)) < 2.5) continue;
      if(abs(tpos.x - trailX(tpos.y))  < 3.2) continue;
      float tr = treeTrunk(p, tpos, seed);
      if(tr < d){ d = tr; mat = 1.0; }
      float ca = treeCanopy(p, tpos, seed);
      if(ca < d){ d = ca; mat = 2.0; }
    }
  }

  if(p.y < 2.5){
    vec2 fc = floor(p.xz / 1.8);
    for(int fx=-1; fx<=1; fx++){
      for(int fz=-1; fz<=1; fz++){
        vec2 fcc = fc + vec2(float(fx), float(fz));
        float fs = hash1(fcc + 100.0);
        if(fs < 0.65) continue;
        vec2 fjit = hash2(fcc + 200.0) * 1.2;
        vec2 fpos = fcc * 1.8 + fjit;
        if(abs(fpos.x - streamX(fpos.y)) < 2.2) continue;
        if(abs(fpos.x - trailX(fpos.y))  < 2.8) continue;
        float fe = fern(p, fpos, fs);
        if(fe < d){ d = fe; mat = 4.0; }
      }
    }
  }

  // Buissons – 2 grilles : petits clusters (2–4 sphères) et moyens (6–12 sphères)
  if(p.y < 5.0){
    // Petits buissons : sz=0.10–0.20m → 2–4 sphères de 4.5cm
    vec2 sbc = floor(p.xz / 1.8);
    for(int bx=-1; bx<=1; bx++){
      for(int bz=-1; bz<=1; bz++){
        vec2 bcc = sbc + vec2(float(bx), float(bz));
        float bs = hash1(bcc + 700.0);
        if(bs < 0.55) continue;
        vec2 bpos = bcc * 1.8 + hash2(bcc + 800.0) * 1.1;
        if(abs(bpos.x - streamX(bpos.y)) < 1.5) continue;
        if(abs(bpos.x - trailX(bpos.y))  < 2.0) continue;
        float be = bush(p, bpos, bs, 0.16 + bs*0.14);
        if(be < d){ d = be; mat = 5.0; }
      }
    }
    // Moyens buissons : sz=0.20–0.45m → 5–15 sphères
    vec2 bc = floor(p.xz / 3.0);
    for(int bx=-1; bx<=1; bx++){
      for(int bz=-1; bz<=1; bz++){
        vec2 bcc = bc + vec2(float(bx), float(bz));
        float bs = hash1(bcc + 300.0);
        if(bs < 0.45) continue;
        vec2 bpos = bcc * 3.0 + hash2(bcc + 400.0) * 2.0;
        if(abs(bpos.x - streamX(bpos.y)) < 2.0) continue;
        if(abs(bpos.x - trailX(bpos.y))  < 2.5) continue;
        float be = bush(p, bpos, bs, 0.32 + bs*0.36);
        if(be < d){ d = be; mat = 5.0; }
      }
    }
    // Grands buissons : sz=0.8–1.5m, sphères 10cm, rares (grille 7m)
    vec2 lbc = floor(p.xz / 7.0);
    for(int bx=-1; bx<=1; bx++){
      for(int bz=-1; bz<=1; bz++){
        vec2 bcc = lbc + vec2(float(bx), float(bz));
        float bs = hash1(bcc + 900.0);
        if(bs < 0.60) continue;
        vec2 bpos = bcc * 7.0 + hash2(bcc + 950.0) * 4.0;
        if(abs(bpos.x - streamX(bpos.y)) < 2.5) continue;
        if(abs(bpos.x - trailX(bpos.y))  < 3.0) continue;
        float be = bushLarge(p, bpos, bs, 1.20 + bs*1.30);
        if(be < d){ d = be; mat = 5.0; }
      }
    }
  }

  return vec2(d, mat);
}

float sceneFast(vec3 p){
  float d = ground(p);
  vec2 cell = floor(p.xz / 3.8);
  for(int dx=-1; dx<=1; dx++){
    for(int dz=-1; dz<=1; dz++){
      vec2 cc = cell + vec2(float(dx), float(dz));
      vec2 jit = hash2(cc) * 3.0;
      vec2 tpos = cc * 3.8 + jit;
      float seed = hash1(cc);
      if(seed < 0.15) continue;
      if(abs(tpos.x - streamX(tpos.y)) < 2.5) continue;
      if(abs(tpos.x - trailX(tpos.y))  < 3.2) continue;
      // Troncs trop fins pour les ombres — canopée suffit
      d = min(d, treeCanopy(p, tpos, seed));
    }
  }
  return d;
}

// ---- Ray march ----
vec2 march(vec3 ro, vec3 rd, float maxD){
  float t = 0.0, mat = -1.0;
  for(int i=0; i<45; i++){
    vec3 p = ro + rd*t;
    vec2 h = scene(p);
    if(h.x < 0.005*(1.0+t*0.1)){ mat=h.y; break; }
    t += h.x * 0.9;
    if(t > maxD) break;
  }
  return vec2(t, mat);
}

vec3 calcNormal(vec3 p){
  vec2 e = vec2(0.008, 0.0);
  return normalize(vec3(
    scene(p+e.xyy).x - scene(p-e.xyy).x,
    scene(p+e.yxy).x - scene(p-e.yxy).x,
    scene(p+e.yyx).x - scene(p-e.yyx).x
  ));
}

float softShadow(vec3 ro, vec3 rd, float mint, float maxt){
  float res = 1.0, t = mint;
  for(int i=0; i<8; i++){
    float h = sceneFast(ro + rd*t);
    res = min(res, 7.0*h/t);
    t += clamp(h, 0.05, 0.6);
    if(res < 0.01 || t > maxt) break;
  }
  return clamp(res, 0.0, 1.0);
}

// ---- God rays (version légère : check binaire au lieu de softShadow) ----
float godRays(vec3 ro, vec3 rd, float maxT, vec3 ldir){
  float sum = 0.0, t = 0.0;
  float stepSize = maxT / 5.0;
  for(int i=0; i<5; i++){
    t += stepSize * (0.5 + 0.5*hash(float(i)+iTime*0.1));
    vec3 p = ro + rd*t;
    // Check binaire : occluded ou pas (pas de pénombre → x10 plus rapide)
    float occ = step(0.15, sceneFast(p + ldir * 1.5));
    float dens = exp(-max(p.y - 2.5, 0.0)*0.35) * 0.007;
    sum += occ * dens * stepSize;
  }
  return sum;
}

void main(){
  vec2 uv = (gl_FragCoord.xy - 0.5*iResolution.xy) / iResolution.y;

  // Caméra pilotée par distance parcourue
  float ct = uDist;
  float cx = trailX(ct);
  float gh = groundH(vec2(cx, ct));
  vec3 ro = vec3(cx, gh + 1.65 + sin(iTime*0.7)*0.06, ct);

  // Regard en avant (suit l'altitude du sol)
  float lt = ct + 5.0;
  float lx = trailX(lt);
  float lgh = groundH(vec2(lx, lt));
  vec3 lookAt = vec3(lx, lgh + 0.9 + sin(iTime*0.5)*0.12, lt);

  // Balancement de marche
  ro.y += sin(iTime*2.5)*0.04;
  ro.x += sin(iTime*1.3)*0.04;

  vec3 fwd   = normalize(lookAt - ro);
  vec3 right = normalize(cross(fwd, vec3(0,1,0)));
  vec3 up    = cross(right, fwd);
  vec3 rd    = normalize(fwd + uv.x*right*1.8 + uv.y*up*1.8);

  vec3 sunDir = normalize(vec3(-0.3, 0.9, -0.4));
  // Ciel bleu d'été
  vec3 skyCol = mix(vec3(0.60,0.74,0.90), vec3(0.22,0.44,0.82), clamp(rd.y*1.3, 0.0, 1.0));
  // Horizon légèrement voilé (haze vert pâle en bas)
  skyCol = mix(vec3(0.70,0.80,0.68), skyCol, smoothstep(-0.04, 0.20, rd.y));
  // Halo solaire
  skyCol = mix(skyCol, vec3(1.0, 0.92, 0.65), pow(max(dot(rd,sunDir),0.0), 10.0));

  float maxD = 90.0;
  vec2 hit = march(ro, rd, maxD);
  float t = hit.x;
  float mat = hit.y;

  vec3 col = skyCol;

  if(t < maxD){
    vec3 p = ro + rd*t;
    vec3 n = calcNormal(p);

    vec3 albedo;
    float diff = max(dot(n, sunDir), 0.0);
    float shadow = softShadow(p + n*0.04, sunDir, 0.08, 10.0);

    if(mat < 0.5){
      // Sol
      // fbmPerlin = gradient noise (pas de damier), 5 octaves pour detailler organique
      float moss  = fbmPerlin(p.xz * 1.2 + vec2(3.1, 7.4), 5);
      float moss2 = fbmPerlin(p.xz * 0.4 + vec2(9.2, 2.7), 3); // variation macro
      moss = moss * 0.7 + moss2 * 0.3;
      albedo = mix(vec3(0.16,0.10,0.04), vec3(0.08,0.20,0.04), smoothstep(0.3,0.6,moss));
      albedo = mix(albedo, vec3(0.05,0.16,0.03), smoothstep(0.55,0.7,moss));
      // Près du ruisseau
      float sx = streamX(p.z);
      albedo = mix(albedo*0.55, albedo, smoothstep(0.8, 2.2, abs(p.x-sx)));
      // Sentier
      float tx = trailX(p.z);
      float dt = abs(p.x - tx);
      float onTrail = smoothstep(1.5, 0.2, dt);
      if(onTrail > 0.01){
        float tn = noise(p.xz*6.0)*0.3 + noise(p.xz*18.0)*0.15;
        vec3 trailCol = vec3(0.24,0.16,0.07) * (0.8+tn);
        trailCol = mix(vec3(0.13,0.10,0.04), trailCol, smoothstep(0.0,0.5,onTrail));
        float peb = smoothstep(0.72,0.78,noise(p.xz*22.0));
        trailCol = mix(trailCol, vec3(0.27,0.23,0.17), peb*0.4);
        albedo = mix(albedo, trailCol, onTrail);
      }
    }
    else if(mat < 1.5){
      // ---- Bosselage Perlin : perturbation de la normale ----
      // 1 octave (au lieu de fbmPerlin×3) : 3× moins cher, visuellement proche
      float be = 0.03;
      float b0  = perlin(p.xz * 4.0 + p.y * 0.65);
      float bx  = perlin((p.xz + vec2(be, 0.0)) * 4.0 + p.y * 0.65);
      float bz  = perlin((p.xz + vec2(0.0, be)) * 4.0 + p.y * 0.65);
      float b0f = perlin(p.xz * 13.0 + p.y * 2.2);
      float bxf = perlin((p.xz + vec2(be, 0.0)) * 13.0 + p.y * 2.2);
      float bzf = perlin((p.xz + vec2(0.0, be)) * 13.0 + p.y * 2.2);
      vec3 bumpGrad = vec3(
        (bx  - b0 ) / be * 0.55 + (bxf - b0f) / be * 0.16,
        0.0,
        (bz  - b0 ) / be * 0.55 + (bzf - b0f) / be * 0.16
      );
      n = normalize(n + bumpGrad);
      diff = max(dot(n, sunDir), 0.0);

      // Tronc – écorce avec fissures irrégulières multi-couches
      // Distorsion Perlin (fluide) + value noise (détail)
      float warpA = perlin(p.xz * 1.8) * 3.4 + perlin(p.xz * 0.5) * 2.0;
      float warpB = perlin(p.xz * 4.2  + p.y * 0.05) * 0.9;
      float warpC = noise(p.xz * 9.0   + p.y * 0.20) * 0.40; // micro-turbulences
      // Fréquence variable (Perlin → espacement organique)
      float freqMod = 0.50 + perlin(p.xz * 0.80) * 0.34;
      float f1 = fract(p.y * freqMod + warpA + warpC * 0.4);
      // Profondeur variable pilotée par fbmPerlin
      float depth1 = 0.45 + fbmPerlin(p.xz * 1.8, 3) * 1.1;
      float fissure1 = (1.0 - smoothstep(0.0, 0.11, f1) * smoothstep(1.0, 0.89, f1)) * depth1;
      // Fissures secondaires
      float f2 = fract(p.y * 1.55 + warpA * 0.4 + warpB + warpC);
      float depth2 = 0.20 + perlin(p.xz * 3.5 + p.y * 0.25) * 0.50;
      float fissure2 = (1.0 - smoothstep(0.0, 0.07, f2) * smoothstep(1.0, 0.93, f2)) * depth2;
      float fissures = clamp(fissure1 + fissure2, 0.0, 1.0);
      // Rugosité Perlin multi-échelle
      float rough = fbmPerlin(p.xz * 4.5  + p.y * 0.15, 2) * 0.58
                  + noise(p.xz * 22.0 + p.y * 0.5) * 0.25
                  + noise(p.xz * 58.0) * 0.10;
      // Fort contraste fissures/crêtes
      vec3 barkFissure = vec3(0.022, 0.010, 0.003);
      vec3 barkRidge   = vec3(0.27, 0.17, 0.07);
      albedo = mix(barkRidge, barkFissure, fissures);
      albedo *= 0.70 + rough * 0.60;

      // ---- Anneaux indépendants (couche séparée, non noyée dans fissures) ----
      // Basse fréquence XZ → 2–3 ondulations lisses sur la circonférence
      float pn1 = perlin(p.xz * 1.6) * 2.0 - 1.0;           // ±1, ~2 cycles
      float pn2 = perlin(p.xz * 3.0 + vec2(5.1, 2.7)) * 2.0 - 1.0;
      float pn3 = perlin(p.xz * 5.8 + p.y * 0.06) * 2.0 - 1.0;
      // Warp → anneaux ondulent de ±0.7 m en hauteur
      float ringWarp = pn1 * 0.90 + pn2 * 0.35 + pn3 * 0.08;
      float ringFreq = 1.2 + pn1 * 0.15;
      float fRing = fract(p.y * ringFreq + ringWarp);
      // Bandes plus épaisses (~7–11 cm) → visibles
      float ringW = 0.07 + perlin(p.xz * 4.0 + p.y * 0.5) * 0.04;
      float ringMask = 1.0 - smoothstep(0.0, ringW, fRing) * smoothstep(1.0, 1.0 - ringW, fRing);
      // Intensité variable par anneau
      float ringStr = 0.35 + (pn2 * 0.5 + 0.5) * 0.35;  // 0.35–0.70
      // Appliqué comme darkening direct sur albedo (toujours visible)
      albedo = mix(albedo, albedo * 0.18, ringMask * ringStr);

      // Lichen / mousse verte
      float lichen = smoothstep(0.64, 0.74, noise(p.xz * 1.4 + p.y * 0.08));
      albedo = mix(albedo, vec3(0.07, 0.12, 0.03), lichen * 0.45);
    }
    else if(mat < 2.5){
      // Canopée – verts d'été saturés
      float lv = noise(p.xz*5.0);
      albedo = mix(vec3(0.04,0.14,0.02), vec3(0.12,0.30,0.05), lv);
      albedo = mix(albedo, vec3(0.22,0.24,0.03), smoothstep(0.7,0.9,lv)*0.22);
      // Translucidité (lumière filtrée)
      albedo += vec3(0.06,0.13,0.01) * max(dot(n, sunDir),0.0);
    }
    else if(mat < 3.5){
      // Eau
      n = normalize(n + vec3(sin(p.x*5.0+iTime*3.0)*0.08, 0, cos(p.z*4.0+iTime*2.0)*0.08));
      albedo = vec3(0.02,0.05,0.08);
      float spec = pow(max(dot(reflect(rd,n),sunDir),0.0), 32.0);
      albedo += vec3(0.4,0.35,0.2)*spec*0.7;
    }
    else if(mat < 4.5){
      // Fougère – vert vif
      float fv = noise(p.xz*12.0);
      albedo = mix(vec3(0.04,0.14,0.02), vec3(0.09,0.24,0.04), fv);
      albedo += vec3(0.05,0.14,0.01) * max(dot(-n,sunDir),0.0) * 0.5;
    }
    else {
      // Bump mapping 3D ISOTROPE (gradient noise3 – aucun striping axial)
      float be3 = 0.018;
      float bn0 = noise3(p * 9.0);
      float bnx = noise3((p + vec3(be3,0.0,0.0)) * 9.0);
      float bny = noise3((p + vec3(0.0,be3,0.0)) * 9.0);
      float bnz = noise3((p + vec3(0.0,0.0,be3)) * 9.0);
      float bf0 = noise3(p * 20.0);
      float bfx = noise3((p + vec3(be3,0.0,0.0)) * 20.0);
      float bfy = noise3((p + vec3(0.0,be3,0.0)) * 20.0);
      float bfz = noise3((p + vec3(0.0,0.0,be3)) * 20.0);
      vec3 bushBump = (vec3(bnx,bny,bnz) - bn0) / be3 * 2.2
                    + (vec3(bfx,bfy,bfz) - bf0) / be3 * 0.6;
      n    = normalize(n + bushBump);
      diff = max(dot(n, sunDir), 0.0);

      // Palette sombre contrastée (fidèle english_lane)
      float bv1 = noise3(p * 5.0);
      float bv2 = noise3(p * 11.0 + vec3(3.7,1.9,5.1));
      float bv3 = noise(p.xz * 3.0);
      // Palette english_lane légèrement rehaussée pour la forêt
      vec3 c1 = 0.90 * vec3(0.07, 0.30, 0.05);   // vert très sombre
      vec3 c2 = 0.65 * vec3(0.12, 0.60, 0.20);   // vert vif
      vec3 c3 = 0.65 * vec3(0.10, 0.40, 0.09);   // vert moyen
      vec3 c4 = 0.90 * vec3(0.18, 0.39, 0.06);   // olive
      albedo = mix(mix(c1,c2,bv1), mix(c3,c4,bv1), bv3);
      albedo = mix(albedo, 0.60*vec3(0.10,0.30,0.01), smoothstep(0.46,0.54,bv2));
      // AO : ombres profondes dans les creux, clair sur les dômes
      float bushAO = pow(max(0.0, n.y * 0.5 + 0.5), 1.2) * 0.65 + 0.35;
      albedo *= bushAO;
      // SSS bord
      albedo += vec3(0.04, 0.13, 0.01) * max(dot(-n, sunDir), 0.0) * 0.6;
    }

    vec3 amb = vec3(0.08,0.13,0.05) + vec3(0.04,0.07,0.03)*(n.y*0.5+0.5);
    vec3 sunC = vec3(1.0,0.90,0.58);
    col = albedo * (amb + sunC * diff * shadow * 1.0);

    if(mat > 2.5 && mat < 3.5){
      float spec = pow(max(dot(reflect(rd,n),sunDir),0.0), 64.0);
      col += sunC * spec * shadow * 0.45;
    }

    // Brouillard atmosphérique clair
    float fogT = 1.0 - exp(-pow(max(t-30.0,0.0),2.0)*0.00022);
    vec3 fogC = mix(vec3(0.55,0.66,0.52), vec3(0.68,0.76,0.60), 0.5+0.5*rd.y);
    col = mix(col, fogC, fogT);
  }

  // God rays
  float gr = godRays(ro, rd, min(t, 14.0), sunDir);
  col += vec3(1.0,0.9,0.5) * gr * 0.45;

  // Tone mapping + gamma (Reinhard moins agressif)
  col = col / (col + 0.28);
  col *= vec3(1.02, 1.0, 0.93);
  vec2 vuv = gl_FragCoord.xy / iResolution.xy;
  col *= 1.0 - 0.38*length((vuv-0.5)*1.3);
  col = pow(max(col,0.0), vec3(1.0/2.2));

  fragColor = vec4(col, 1.0);
}
`;

// ══════════════════════════════════════════════════════════════════════════════
//  WebGL2 setup
// ══════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, powerPreference: 'high-performance', preserveDrawingBuffer: false });
if (!gl) {
  document.getElementById('loading').textContent = 'WebGL2 non supporté';
  throw 'no webgl2';
}

function compileShader(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS))
    throw gl.getShaderInfoLog(sh);
  return sh;
}

let prog = null, blitProg = null;
setTimeout(() => {
  try {
    const vs  = compileShader(gl.VERTEX_SHADER,   VS);
    const fs  = compileShader(gl.FRAGMENT_SHADER, FS);
    const p   = gl.createProgram();
    gl.attachShader(p, vs); gl.attachShader(p, fs);
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw gl.getProgramInfoLog(p);
    prog = p;

    const bvs = compileShader(gl.VERTEX_SHADER,   BLIT_VS);
    const bfs = compileShader(gl.FRAGMENT_SHADER, BLIT_FS);
    const bp  = gl.createProgram();
    gl.attachShader(bp, bvs); gl.attachShader(bp, bfs);
    gl.linkProgram(bp);
    if (!gl.getProgramParameter(bp, gl.LINK_STATUS)) throw gl.getProgramInfoLog(bp);
    blitProg = bp;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('hud').style.opacity = '1';
  } catch(e) {
    document.getElementById('loading').innerHTML = 'Erreur shader :<br><pre style="font-size:10px;text-align:left;max-width:90vw;overflow:auto">'+e+'</pre>';
    console.error(e);
  }
}, 50);

// Quad plein écran
const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, null);
gl.bindVertexArray(null);

// ── État tapis ──────────────────────────────────────────────────────────────
let speed = 4.0, dist = 0.0, elapsed = 0.0;
let distTarget = null;   // dernière valeur API (null = pas encore reçue)
let paused = false, lastT = null, frame = 0;
let _treadmill_connected = false, _treadmill_steps = 0;

const _urlSeed = new URLSearchParams(location.search).get('seed');
let seed = _urlSeed !== null ? parseInt(_urlSeed) : Math.floor(Math.random() * 200) - 100;

window.setSeed = function(n) { seed = n; };

window.updateTreadmill = function(speedKmh, distM, steps, elapsedS) {
  if (!_treadmill_connected) {
    document.getElementById('bar').style.display = 'none';
    _treadmill_connected = true;
  }
  speed      = speedKmh;
  distTarget = distM;   // correction douce dans la boucle, pas de téléport
  elapsed    = elapsedS;
  _treadmill_steps = steps;
};

if (location.protocol === 'http:' || location.protocol === 'https:') {
  setInterval(() => {
    fetch('/api/treadmill?t=' + Date.now())
      .then(r => r.json())
      .then(d => window.updateTreadmill(d.speed, d.dist, d.steps, d.elapsed))
      .catch(() => {});
  }, 500);
}

// Budget max en pixels – indépendant de la taille de fenêtre
const MAX_FBO_W = 896, MAX_FBO_H = 504;
let renderScale = 0.60;

// Mesure FPS et ajuste renderScale (entre 0.50 et 0.75)
let _fpsFrames = 0, _fpsLast = 0;
function updateRenderScale(ts) {
  _fpsFrames++;
  if (ts - _fpsLast >= 2000) {
    const fps = _fpsFrames * 1000 / (ts - _fpsLast);
    if      (fps < 28 && renderScale > 0.42) renderScale = +(Math.max(0.42, renderScale - 0.08)).toFixed(2);
    else if (fps > 52 && renderScale < 0.65) renderScale = +(Math.min(0.65, renderScale + 0.04)).toFixed(2);
    _fpsFrames = 0; _fpsLast = ts;
  }
}

function resize() {
  const dpr = Math.min(devicePixelRatio || 1, 1.5);
  canvas.width  = Math.round(window.innerWidth  * dpr);
  canvas.height = Math.round(window.innerHeight * dpr);
}
resize();
window.addEventListener('resize', resize);

let fbo = null, fboTex = null, fboW = 0, fboH = 0;
function ensureFBO(w, h) {
  if (fboW === w && fboH === h) return;
  if (fbo) { gl.deleteFramebuffer(fbo); gl.deleteTexture(fboTex); }
  fboTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, fboTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.bindTexture(gl.TEXTURE_2D, null);
  fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, fboTex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  fboW = w; fboH = h;
}

const ul = n => gl.getUniformLocation(prog, n);

function fmtTime(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
  return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function render(ts) {
  if (!prog || !blitProg) { requestAnimationFrame(render); return; }
  if (!lastT) lastT = ts;
  const delta = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;

  if (!paused) {
    dist    += (speed / 3.6) * delta;
    elapsed += delta;
    // Correction vers l'avant uniquement (jamais de recul = pas de saccade)
    if (distTarget !== null) {
      const drift = distTarget - dist;
      if (drift > 5.0) {
        dist = distTarget;             // 1re connexion ou reprise : snap en avant
      } else if (drift > 0.05) {
        dist += Math.min(drift, 0.3 * delta);  // rattrapage doux en avant seulement
      }
      // drift < 0 : dist est légèrement en avance → on ne recule pas
    }
  }

  updateRenderScale(ts);
  const w = canvas.width, h = canvas.height;
  const rw = Math.min(MAX_FBO_W, Math.max(1, Math.round(w * renderScale)));
  const rh = Math.min(MAX_FBO_H, Math.max(1, Math.round(h * renderScale)));
  ensureFBO(rw, rh);

  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.viewport(0, 0, rw, rh);
  gl.useProgram(prog);

  gl.uniform3f(ul('iResolution'), rw, rh, 1.0);
  gl.uniform1f(ul('iTime'),  ts / 1000.0);
  gl.uniform1i(ul('iFrame'), frame++);
  gl.uniform1f(ul('uDist'),  dist * 3.0);
  gl.uniform1f(ul('uSpeed'), speed);
  gl.uniform1f(ul('uSeed'),  seed);

  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindVertexArray(null);

  // Blit FBO → canvas
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, w, h);
  gl.useProgram(blitProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, fboTex);
  gl.uniform1i(gl.getUniformLocation(blitProg, 'uTex'), 0);
  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindVertexArray(null);
  gl.finish();

  // HUD
  document.getElementById('h1').textContent = speed.toFixed(1) + ' km/h';
  document.getElementById('h2').textContent = (dist/1000).toFixed(2) + ' km';
  document.getElementById('h3').textContent = fmtTime(elapsed);
  document.getElementById('h4').textContent = (_treadmill_connected ? _treadmill_steps : Math.round(dist/0.76)) + ' pas';

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// UI – boutons
document.getElementById('btn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('btn').textContent = paused ? '▶' : '⏸';
});
const sp = document.getElementById('sp');
sp.addEventListener('input', () => {
  speed = parseFloat(sp.value);
  document.getElementById('sl').textContent = speed.toFixed(1) + ' km/h';
});
document.getElementById('btn-seed-default').addEventListener('click', () => { seed = 0; });
document.getElementById('btn-seed-random').addEventListener('click', () => {
  seed = Math.floor(Math.random() * 200) - 100;
});

// ── Mode PIP ─────────────────────────────────────────────────────────────────
const _pip = new URLSearchParams(location.search).get('pip') === '1';
if (_pip) {
  // Mode PIP : masquer les contrôles, HUD compact toujours visible
  document.getElementById('bar').style.display = 'none';
  document.getElementById('btn-seed-default').style.display = 'none';
  document.getElementById('btn-seed-random').style.display  = 'none';
  document.getElementById('btn-pip').style.display          = 'none';
  const hud = document.getElementById('hud');
  hud.style.opacity = '1';
  hud.style.background = 'rgba(0,0,0,0.55)';
}

// Bouton PIP : demande au serveur Python de lancer la fenêtre flottante
document.getElementById('btn-pip').addEventListener('click', () => {
  if (location.protocol === 'http:' || location.protocol === 'https:') {
    fetch('/api/pip?seed=' + seed).catch(() => {});
  }
});
</script>
</body>
</html>
