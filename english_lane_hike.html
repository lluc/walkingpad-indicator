<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Randonnée – English Lane (raymarching)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh}
canvas{width:100%;height:100%;display:block;will-change:transform;transform:translateZ(0)}
#hud{position:fixed;top:0;left:0;right:0;background:rgba(8,10,14,.74);padding:5px 16px;display:flex;gap:24px;justify-content:center;z-index:10;opacity:0;transition:opacity .6s}
#hud span{color:#fff;font:13px/1.8 monospace}
#hud button{background:none;border:none;cursor:pointer;font-size:16px;padding:0 2px;opacity:.7;transition:opacity .2s}
#hud button:hover{opacity:1}
#bar{position:fixed;bottom:10px;left:10px;right:10px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.66);border-radius:7px;padding:7px 14px;z-index:10}
#bar span{color:#9ab;font-size:11px;white-space:nowrap}
#bar #sl{color:#fff;min-width:60px}
input[type=range]{flex:1;accent-color:#7ecf7e;height:3px}
button{background:rgba(255,255,255,.12);border:none;border-radius:4px;color:#fff;font-size:13px;padding:3px 10px;cursor:pointer}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#cdd;font:14px monospace;background:#000;z-index:20;gap:16px}
#loading p{opacity:.6;font-size:12px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="loading">
  <div>Compilation du shader… ≈15 secondes</div>
  <p>English Lane · Jerome Liard (CC BY-NC-SA 3.0) · adapté pour randonnée</p>
</div>
<div id="hud">
  <span id="h1">0.0 km/h</span>
  <span id="h2">0.00 km</span>
  <span id="h3">0:00:00</span>
  <span id="h4">0 pas</span>
  <button id="btn-seed-default" title="Paysage par défaut">🏡</button>
  <button id="btn-seed-random"  title="Paysage aléatoire">🎲</button>
  <button id="btn-pip" title="Picture-in-Picture (fenêtre flottante)">⧉</button>
</div>
<div id="bar">
  <button id="btn">⏸</button>
  <span>Vitesse</span>
  <input type="range" id="sp" min="0" max="20" step="0.1" value="4">
  <span id="sl">4.0 km/h</span>
</div>
<script>
// ══════════════════════════════════════════════════════════════════════════════
//  Vertex shader – quad plein écran
// ══════════════════════════════════════════════════════════════════════════════
const VS = `#version 300 es
layout(location=0) in vec2 aPos;
void main(){ gl_Position = vec4(aPos, 0., 1.); }`;

// ══════════════════════════════════════════════════════════════════════════════
//  Fragment shader
//  Base : "English Lane" by Jerome Liard, April 2021
//  https://www.shadertoy.com/view/fsXXzX
//  License CC BY-NC-SA 3.0
//  Modifications pour randonnée tapis :
//    • BUFFER_MODE 0  (single-pass, pas de reprojection)
//    • CLOUD_MODE  0  (nuages désactivés pour les perfs)
//    • GetCameraTransform remplacé par caméra randonnée pilotée par uDist
//    • uniform uDist (mètres parcourus), uSpeed (km/h)
// ══════════════════════════════════════════════════════════════════════════════
const FS = `#version 300 es
precision highp float;
precision highp int;
precision highp sampler2D;

// ── Uniforms Shadertoy standard ──────────────────────────────────────────────
uniform vec3  iResolution;
uniform float iTime;
uniform int   iFrame;
uniform vec4  iMouse;
uniform vec4  iDate;
uniform sampler2D iChannel0;
uniform sampler2D iChannel1;

// ── Uniforms tapis de marche ─────────────────────────────────────────────────
uniform float uDist;   // distance parcourue en mètres
uniform float uSpeed;  // vitesse en km/h
uniform float uSeed;   // décalage de lane_index → paysage différent par seed

out vec4 fragColor;

// ── Modifications par rapport à l'original ───────────────────────────────────
#define BUFFER_MODE 0     // single-pass (pas de Buffer A/B)
#define CLOUD_MODE  0     // nuages désactivés

// ── Code original de Jerome Liard (English Lane) ─────────────────────────────
#define DIFFERENT_LANE_EVERYDAY 0
#if DIFFERENT_LANE_EVERYDAY==0
#define FIRST_LANE_INDEX 10.0
#else
#define FIRST_LANE_INDEX (-80.0+mod(iDate.x*365.+iDate.y*31.+iDate.z,160.))
#endif

#define PI 3.141592654
#define FLT_MAX 1000000.0
#define SQR2 1.414213562
#define SQR3 1.732050807
#define RED   vec3(1,0,0)
#define GREEN vec3(0,1,0)
#define BLUE  vec3(0,0,1)
#define WHITE vec3(1,1,1)
#define BLACK vec3(0,0,0)
#define MAGENTA vec3(1,0,1)
#define YELLOW  vec3(1,1,0)
#define AZURE   vec3(0.0,0.5,1.0)

#define A_FEW_FUNC(type) \
type saturate(type x){return clamp(x,type(0.0),type(1.0));} \
type smoothstep_unchecked(type x){return(x*x)*(type(3.0)-x*2.0);} \
type smoothstep_unchecked_d(type x){return 6.0*x*(type(1.0)-x);}
A_FEW_FUNC(float) A_FEW_FUNC(vec2) A_FEW_FUNC(vec3) A_FEW_FUNC(vec4)

float exp_decay(float x){return 1.-exp(-x);}
float cubicbump(float x,float df0,float df1){float a=df1+df0;float c=df0;float b=-a-c;return x*(x*(x*a+b)+c);}
float smoothbump(float a,float r,float x){return 1.0-smoothstep_unchecked(min(abs(x-a),r)/r);}
float smoothstep_c(float x,float c,float r){return smoothstep(c-r,c+r,x);}
float smoothband(float x,float r,float raa){return 1.-smoothstep_c(abs(x),r,raa);}
float smoothband(float x,float s,float e,float raa){return smoothband(x-(e+s)*0.5,(e-s)*0.5,raa);}
vec2 perp(vec2 v){return vec2(-v.y,v.x);}
float calc_angle(vec2 v){return atan(v.y,v.x);}
float calc_angle(vec2 a,vec2 b){return calc_angle(vec2(dot(a,b),dot(perp(a),b)));}
float contrast(float x,float s){return(x-0.5)*s+0.5;}
vec3  contrast(vec3 x,vec3 s){return(x-0.5)*s+0.5;}
float lensqr(vec2 v){return dot(v,v);}
float lensqr(vec3 v){return dot(v,v);}
float lensqr(vec4 v){return dot(v,v);}
float pow2(float x){return x*x;}
vec3  pow2(vec3 x){return x*x;}
vec4  pow2(vec4 x){return x*x;}
float smin_exp2(float a,float b,float k){return-log2(exp2(-k*a)+exp2(-k*b))/k;}
float smax_exp2(float a,float b,float k){return-smin_exp2(-a,-b,k);}
float smin_pol(float a,float b,float k){float h=clamp(0.5+0.5*(b-a)/k,0.0,1.0);return mix(b,a,h)-k*h*(1.0-h);}
float smax_pol(float a,float b,float k){return-smin_pol(-a,-b,k);}
float powerful_scurve(float x,float p1,float p2){return pow(1.0-pow(1.0-clamp(x,0.0,1.0),p2),p1);}
float maxcomp(float x){return x;}
float maxcomp(vec2 v){return max(v.x,v.y);}
float maxcomp(vec3 v){return max(max(v.x,v.y),v.z);}
float min_(float x,float y,float z){return min(min(x,y),z);}
float max_(float x,float y,float z){return max(max(x,y),z);}
float nearest(float x){return floor(0.5+x);}
float nearest(float x,float spacing){return floor(0.5+x/spacing)*spacing;}
vec2  nearest(vec2 x,vec2 spacing){return floor(vec2(0.5)+x/spacing)*spacing;}
float sum(vec4 v){return v.x+v.y+v.z+v.w;}
float safe_acos(float x){return acos(clamp(x,-1.,1.));}

#define PROJECT_ON_LINE1(type) \
type project_on_line(type P,type O,type d){return O+d*dot(P-O,d)/dot(d,d);} \
type project_on_plane(type P,type O,type n){return P-n*dot(P-O,n)/dot(n,n);}
PROJECT_ON_LINE1(vec2) PROJECT_ON_LINE1(vec3)

#define FAST_SIGNED_DISTANCE_TO_FUNC_11_ARG(a_signed_distance,a_p,a_func,a_arg,a_epsilon) \
{vec2 _p=a_p;float _epsilon=a_epsilon;float _y=a_func(_p.x,a_arg);float _y1=a_func(_p.x+_epsilon,a_arg);float _ddy=(_y1-_y)*(1./_epsilon);a_signed_distance=(_p.y-_y)/sqrt(1.+_ddy*_ddy);}

#define CLOSEST_POINT_TANGENT_TO_FUNCD_11_ARG_CHEAP(a_ret,a_p,a_funcd,a_funcd_arg,a_cheap) \
{vec2 _p=a_p.xy,_c,_dc,_ev;float _t=_p.x;_ev=a_funcd(_t,a_funcd_arg);_c=vec2(_t,_ev.x);_dc=vec2(1.0,_ev.y);if(!(a_cheap)){_t+=dot(_p.xy-_c,_dc)/dot(_dc,_dc);_ev=a_funcd(_t,a_funcd_arg);_c=vec2(_t,_ev.x);_dc=vec2(1.0,_ev.y);}a_ret=vec4(_c-_p,_dc);}

vec3 transform_vector(mat4 m,vec3 v){return(m*vec4(v,0.0)).xyz;}
struct bounds2{vec2 pmin;vec2 pmax;};
bounds2 mkbounds_unchecked(vec2 amin,vec2 amax){bounds2 ret;ret.pmin=amin;ret.pmax=amax;return ret;}

#define REPEAT_FUNCTIONS(type) \
type repeat(type x,type len){return len*fract(x*(type(1.0)/len));} \
type repeat_mirror(type x,type len){return len*abs(type(-1.0)+2.0*fract(((x*(type(1.0)/len))-type(-1.0))*0.5));}
REPEAT_FUNCTIONS(float) REPEAT_FUNCTIONS(vec2)

float stripes(float x,float period,float r,float raa){return smoothstep(r+raa,r-raa,repeat_mirror(x,period*0.5));}
vec2  stripes(vec2 x,vec2 period,vec2 r,vec2 raa){return smoothstep(r+raa,r-raa,repeat_mirror(x,period*0.5));}
float tri_sin(float x){return(abs(fract((x-PI*0.5)/(PI*2.))-0.5)-0.25)*4.0;}

float hash11(float p){p=fract(p*.1031);p*=p+33.33;p*=p+p;return fract(p);}
float hash12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
float hash13(vec3 p3){p3=fract(p3*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
vec2  hash22(vec2 p){vec3 p3=fract(vec3(p.xyx)*vec3(.1031,.1030,.0973));p3+=dot(p3,p3.yzx+33.33);return fract((p3.xx+p3.yz)*p3.zy);}
vec2  hash23(vec3 p3){p3=fract(p3*vec3(.1031,.1030,.0973));p3+=dot(p3,p3.yzx+33.33);return fract((p3.xx+p3.yz)*p3.zy);}
vec3  hash31(float p){vec3 p3=fract(vec3(p)*vec3(.1031,.1030,.0973));p3+=dot(p3,p3.yzx+33.33);return fract((p3.xxy+p3.yzz)*p3.zyx);}
vec3  hash32(vec2 p){vec3 p3=fract(vec3(p.xyx)*vec3(.1031,.1030,.0973));p3+=dot(p3,p3.yxz+33.33);return fract((p3.xxy+p3.yzz)*p3.zyx);}
vec3  hash33(vec3 p3){p3=fract(p3*vec3(.1031,.1030,.0973));p3+=dot(p3,p3.yxz+33.33);return fract((p3.xxy+p3.yxx)*p3.zyx);}

vec4 hash42_(ivec2 x0){uint k=1103515245U;uvec4 x=uvec4(x0,x0*0x8da6b343);x=((x>>13U)^x.yzwx)*k;x=((x>>13U)^x.zwxy)*k;return vec4(x)*(1.0/float(0xffffffffU));}
float hash1u2_4tXyWN(uvec2 x){uvec2 q=1103515245U*((x>>1U)^(x.yx));uint n=1103515245U*((q.x)^(q.y>>3U));return float(n)*(1.0/float(0xffffffffU));}
uint lowbias32(uint x){x^=x>>16;x*=0x7feb352dU;x^=x>>15;x*=0x846ca68bU;x^=x>>16;return x;}
float hash11u_lowbias32(uint x){return float(lowbias32(x))/float(0xffffffffU);}

#define V30 vec2(0.866025403,0.5)
#define V45 vec2(0.707106781,0.707106781)
#define V60 vec2(0.5,0.866025403)
vec2 unit_vector2(float angle){return vec2(cos(angle),sin(angle));}
vec2 rotate_with_unit_vector(vec2 p,vec2 cs){return vec2(cs.x*p.x-cs.y*p.y,cs.y*p.x+cs.x*p.y);}
vec2 rotate_with_angle(vec2 p,float a){return rotate_with_unit_vector(p,unit_vector2(a));}
vec3 zup_spherical_coords_to_vector(vec2 theta_vec,vec2 phi_vec){return vec3(theta_vec.y*phi_vec,theta_vec.x);}
vec3 zup_spherical_coords_to_vector(float theta,float phi){return zup_spherical_coords_to_vector(unit_vector2(theta),unit_vector2(phi));}
vec3 zup_spherical_coords_to_vector(vec2 tp){return zup_spherical_coords_to_vector(tp.x,tp.y);}
vec2 vector_to_zup_spherical_coords(vec3 n){float theta=safe_acos(n.z);float phi=calc_angle(n.xy);return vec2(theta,phi);}
vec3 yup_spherical_coords_to_vector(vec2 theta,vec2 phi){return zup_spherical_coords_to_vector(theta,phi).yzx;}
vec3 yup_spherical_coords_to_vector(float theta,float phi){return yup_spherical_coords_to_vector(unit_vector2(theta),unit_vector2(phi));}
mat4 yup_spherical_coords_to_matrix(vec2 theta,vec2 phi){vec3 y=yup_spherical_coords_to_vector(theta,phi);vec3 z=yup_spherical_coords_to_vector(perp(theta),phi);vec3 x=cross(y,z);return(mat4(vec4(x,0.0),vec4(y,0.0),vec4(z,0.0),vec4(0,0,0,1)));}
mat4 yup_spherical_coords_to_matrix(float theta,float phi){return yup_spherical_coords_to_matrix(unit_vector2(theta),unit_vector2(phi));}
mat4 z_rotation(float angle){vec2 v=unit_vector2(angle);return mat4(vec4(v.x,v.y,0.0,0.0),vec4(-v.y,v.x,0.0,0.0),vec4(0,0,1,0),vec4(0,0,0,1));}
mat3 mat3_rotation_x(vec2 v){return mat3(vec3(1,0,0),vec3(0,v.x,v.y),vec3(0,-v.y,v.x));}
mat3 mat3_rotation_z(vec2 v){return mat3(vec3(v.x,v.y,0),vec3(-v.y,v.x,0),vec3(0,0,1));}
float ed_icdf(float u,float a){return-log(1.-u)*(1.0/a);}

#define INDEXHASHOFFSET3 vec3(137.0,53.0,173)
#define LAYERED1(func,p,args) ((func(p*1.0,args)*0.5)*(1.0/(0.5)))
#define LAYERED2(func,p,args) ((func(p*1.0,args)*0.5+func(p*2.0,args)*0.25)*(1.0/((0.5+0.25))))
#define LAYERED4(func,p,args) ((func(p*1.0,args)*0.5+func(p*2.0,args)*0.25+func(p*4.0,args)*0.125+func(p*8.0,args)*0.0625)*(1.0/((0.5+0.25+0.125+0.0625))))
#define LAYERED5(func,p,args) ((func(p*1.0,args)*0.5+func(p*2.0,args)*0.25+func(p*4.0,args)*0.125+func(p*8.0,args)*0.0625+func(p*16.0,args)*0.03125)*(1.0/((0.5+0.25+0.125+0.0625+0.03125))))

float noise12(vec2 p,bool use_smooth){p-=0.5;vec2 p00=floor(p);vec2 p10=p00+vec2(1,0);vec2 p01=p00+vec2(0,1);vec2 p11=p00+vec2(1,1);float v00=hash12(p00);float v10=hash12(p10);float v01=hash12(p01);float v11=hash12(p11);vec2 f=fract(p);if(use_smooth)f=smoothstep_unchecked(f);float A=v10-v00;float B=v01-v00;float C=(v11-v01)-A;float D=v00;return A*f.x+B*f.y+C*f.x*f.y+D;}
float noise13(vec3 p,bool use_smooth){p-=0.5;vec3 p000=floor(p)+INDEXHASHOFFSET3;vec3 p100=p000+vec3(1,0,0);vec3 p010=p000+vec3(0,1,0);vec3 p110=p000+vec3(1,1,0);vec3 p001=p000+vec3(0,0,1);vec3 p101=p000+vec3(1,0,1);vec3 p011=p000+vec3(0,1,1);vec3 p111=p000+vec3(1,1,1);float v000=hash13(p000);float v100=hash13(p100);float v010=hash13(p010);float v110=hash13(p110);float v001=hash13(p001);float v101=hash13(p101);float v011=hash13(p011);float v111=hash13(p111);vec3 f=fract(p);if(use_smooth)f=smoothstep_unchecked(f);return mix(mix(mix(v000,v100,f.x),mix(v010,v110,f.x),f.y),mix(mix(v001,v101,f.x),mix(v011,v111,f.x),f.y),f.z);}
vec3  noise33(vec3 p,bool use_smooth){p-=0.5;vec3 p000=floor(p)+INDEXHASHOFFSET3;vec3 p100=p000+vec3(1,0,0);vec3 p010=p000+vec3(0,1,0);vec3 p110=p000+vec3(1,1,0);vec3 p001=p000+vec3(0,0,1);vec3 p101=p000+vec3(1,0,1);vec3 p011=p000+vec3(0,1,1);vec3 p111=p000+vec3(1,1,1);vec3 v000=hash33(p000);vec3 v100=hash33(p100);vec3 v010=hash33(p010);vec3 v110=hash33(p110);vec3 v001=hash33(p001);vec3 v101=hash33(p101);vec3 v011=hash33(p011);vec3 v111=hash33(p111);vec3 f=fract(p);if(use_smooth)f=smoothstep_unchecked(f);return mix(mix(mix(v000,v100,f.x),mix(v010,v110,f.x),f.y),mix(mix(v001,v101,f.x),mix(v011,v111,f.x),f.y),f.z);}
float enoise13(vec3 p,float a,bool use_smooth){p-=0.5;vec3 p000=floor(p)+INDEXHASHOFFSET3;vec3 p100=p000+vec3(1,0,0);vec3 p010=p000+vec3(0,1,0);vec3 p110=p000+vec3(1,1,0);vec3 p001=p000+vec3(0,0,1);vec3 p101=p000+vec3(1,0,1);vec3 p011=p000+vec3(0,1,1);vec3 p111=p000+vec3(1,1,1);vec2 h000=hash23(p000);vec2 h100=hash23(p100);vec2 h010=hash23(p010);vec2 h110=hash23(p110);vec2 h001=hash23(p001);vec2 h101=hash23(p101);vec2 h011=hash23(p011);vec2 h111=hash23(p111);float v000=ed_icdf(h000.x,a)*h000.y;float v100=ed_icdf(h100.x,a)*h100.y;float v010=ed_icdf(h010.x,a)*h010.y;float v110=ed_icdf(h110.x,a)*h110.y;float v001=ed_icdf(h001.x,a)*h001.y;float v101=ed_icdf(h101.x,a)*h101.y;float v011=ed_icdf(h011.x,a)*h011.y;float v111=ed_icdf(h111.x,a)*h111.y;vec3 f=fract(p);if(use_smooth)f=smoothstep_unchecked(f);return mix(mix(mix(v000,v100,f.x),mix(v010,v110,f.x),f.y),mix(mix(v001,v101,f.x),mix(v011,v111,f.x),f.y),f.z);}

float snoise12_(vec2 p,float args){return noise12(p,true);}
float snoise13_(vec3 p,float args){return noise13(p,true);}
vec3  noise33_(vec3 p,float args){return noise33(p,false);}
float enoise13_(vec3 p,float a){return enoise13(p,a,false);}
float sfbm1_12(vec2 p){return LAYERED1(snoise12_,p,-1.0);}
float sfbm2_13(vec3 p){return LAYERED2(snoise13_,p,-1.0);}
float sfbm2_13_leaf(vec3 p){return(noise13(p*0.8,true)+noise13(p*4.0,true)*0.6)/1.5;}
float sfbm2_12(vec2 p){return LAYERED2(snoise12_,p,-1.0);}
float efbm4_13(vec3 p,float arg){return LAYERED4(enoise13_,p,arg);}
vec3  sfbm4_33(vec3 p){return LAYERED5(noise33_,p,-1.0);}

struct Ray{vec3 o;vec3 d;};
Ray mkray(vec3 o,vec3 d){Ray tmp;tmp.o=o;tmp.d=d;return tmp;}

vec3 get_view_dir(vec2 normalized_pos,float aspect,float tan_half_fovy_rcp){return normalize(vec3(normalized_pos.x*aspect,normalized_pos.y,-tan_half_fovy_rcp));}
Ray  get_view_ray2(vec2 normalized_pos,float aspect,float tan_half_fovy_rcp,mat4 camera){return mkray(camera[3].xyz,transform_vector(camera,get_view_dir(normalized_pos,aspect,tan_half_fovy_rcp)));}

mat4 lookat(vec3 eye,vec3 center,vec3 up){vec3 z=normalize(eye-center);vec3 x=normalize(cross(up,z));vec3 y=cross(z,x);return mat4(vec4(x,0.0),vec4(y,0.0),vec4(z,0.0),vec4(eye,1.0));}

vec2 sphere_trace(Ray ray,float radius,vec3 center){vec3 O=ray.o;vec3 d=ray.d;float tp=dot(center-O,d);float h_sqr=lensqr((O+d*tp)-center);float radius_sqr=radius*radius;if(h_sqr>radius_sqr)return vec2(FLT_MAX,FLT_MAX);float dt=sqrt(radius_sqr-h_sqr);return vec2(tp-dt,tp+dt);}
float plane_trace(vec3 ray_o,vec3 ray_d,vec3 base,vec3 n,float epsilon){float ddotn=dot(ray_d,n);return abs(ddotn)>epsilon?dot(base-ray_o,n)/ddotn:FLT_MAX;}
float plane_trace(Ray ray,vec3 base,vec3 n,float epsilon){float ddotn=dot(ray.d,n);return abs(ddotn)>epsilon?dot(base-ray.o,n)/ddotn:FLT_MAX;}
float plane_trace_z(Ray ray,float base,float epsilon){return abs(ray.d.z)>epsilon?(base-ray.o.z)/ray.d.z:FLT_MAX;}
float plane_trace_z(vec3 d,float base,float epsilon){return abs(d.z)>epsilon?base/d.z:FLT_MAX;}
float her2(float x,float r){return 0.5*((1.0/r)*x*x+r);}
float curved_max_vfunc_weld_quadric(float x,float r){x=abs(x);return x>r?x:her2(x,r);}
float opI(float d1,float d2){return max(d1,d2);}

function compileShader(type, src) {

  gl.finish();

  // HUD
  document.getElementById('h1').textContent = speed.toFixed(1) + ' km/h';
  document.getElementById('h2').textContent = (dist/1000).toFixed(2) + ' km';
  document.getElementById('h3').textContent = fmtTime(elapsed);
  document.getElementById('h4').textContent = (_treadmill_connected ? _treadmill_steps : Math.round(dist/0.76)) + ' pas';
  requestAnimationFrame(render);
}

requestAnimationFrame(render);

// UI
document.getElementById('sp').addEventListener('input', e => {
  speed = +e.target.value;
  document.getElementById('sl').textContent = speed.toFixed(1) + ' km/h';
});
document.getElementById('btn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('btn').textContent = paused ? '▶' : '⏸';
});
document.getElementById('btn-seed-default').addEventListener('click', () => {
  seed = 0; dist = 0; elapsed = 0;
});
document.getElementById('btn-seed-random').addEventListener('click', () => {
  seed = Math.floor(Math.random() * 200) - 100; dist = 0; elapsed = 0;
});

// ── Mode PIP ─────────────────────────────────────────────────────────────────
const _pip = new URLSearchParams(location.search).get('pip') === '1';
if (_pip) {
  document.getElementById('bar').style.display = 'none';
  document.getElementById('btn-seed-default').style.display = 'none';
  document.getElementById('btn-seed-random').style.display  = 'none';
  document.getElementById('btn-pip').style.display          = 'none';
  const hud = document.getElementById('hud');
  hud.style.opacity = '1';
  hud.style.background = 'rgba(0,0,0,0.55)';
}

document.getElementById('btn-pip').addEventListener('click', () => {
  if (location.protocol === 'http:' || location.protocol === 'https:') {
    fetch('/api/pip?seed=' + seed).catch(() => {});
  }
});
</script>
</body>
</html>
